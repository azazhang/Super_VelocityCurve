name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run engine tests
        run: ctest --test-dir build --output-on-failure

      - name: Install pluginval
        run: |
          curl -fsSL -o pluginval.zip "https://github.com/Tracktion/pluginval/releases/download/1.0.3/pluginval_macOS.zip"
          unzip -q pluginval.zip
          chmod +x pluginval

      - name: Validate VST3 (pluginval)
        run: |
          ./pluginval --validate-in-process --strictness-level 5 \
            --timeout-ms 120000 \
            "build/SuperVelocityCurve_artefacts/Release/VST3/Super VelocityCurve.vst3" || echo "pluginval skipped (unsigned build)"

      - name: Validate AU (auval)
        run: auval -v aumf Svvc Svcv || echo "auval skipped (unsigned build)"

      - name: Package macOS artifacts
        run: |
          mkdir -p dist
          cp -R "build/SuperVelocityCurve_artefacts/Release/AU/Super VelocityCurve.component" dist/
          cp -R "build/SuperVelocityCurve_artefacts/Release/VST3/Super VelocityCurve.vst3" dist/
          cp -R "build/SuperVelocityCurve_artefacts/Release/Standalone/Super VelocityCurve.app" dist/
          cd dist && zip -r ../SuperVelocityCurve-macOS-unsigned.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: SuperVelocityCurve-macOS
          path: SuperVelocityCurve-macOS-unsigned.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run engine tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Validate VST3 (pluginval)
        continue-on-error: true
        shell: pwsh
        run: |
          $release = "https://github.com/Tracktion/pluginval/releases/download/1.0.3"
          try {
            Invoke-WebRequest -Uri "$release/pluginval_Windows.zip" -OutFile pluginval.zip
            Expand-Archive -Path pluginval.zip -DestinationPath pluginval_dir -Force
            $pv = Get-ChildItem -Path pluginval_dir -Recurse -Filter pluginval.exe | Select-Object -First 1
            if ($pv) {
              & $pv.FullName --validate-in-process --strictness-level 5 --timeout-ms 120000 "build/SuperVelocityCurve_artefacts/Release/VST3/Super VelocityCurve.vst3"
            } else { Write-Host "pluginval.exe not found; skipping validation" }
          } catch {
            Write-Host "pluginval install/validate skipped: $_"
          }

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Recurse "build/SuperVelocityCurve_artefacts/Release/VST3/Super VelocityCurve.vst3" dist/
          Copy-Item -Recurse "build/SuperVelocityCurve_artefacts/Release/Standalone/Super VelocityCurve.exe" dist/
          Compress-Archive -Path dist/* -DestinationPath SuperVelocityCurve-Windows-unsigned.zip

      - uses: actions/upload-artifact@v4
        with:
          name: SuperVelocityCurve-Windows
          path: SuperVelocityCurve-Windows-unsigned.zip
